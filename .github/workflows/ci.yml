name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          # The entrypoint sources every lib file in order, so -x covers
          # the whole core. Backend files and the installer are loaded
          # dynamically / standalone so they're checked separately.
          shellcheck -x bin/wabox-bot
          shellcheck lib/backends/*.sh
          shellcheck install.sh
          shellcheck examples/aider.sh
          shellcheck plugins/*/transcribe.sh
          shellcheck config.example

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats + dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq inotify-tools util-linux coreutils
      - name: Run bats
        run: bats test/bats/
