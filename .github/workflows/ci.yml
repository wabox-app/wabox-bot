name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          # The entrypoint sources every lib file in order, so -x covers
          # the whole core. The backend files are loaded dynamically so
          # they're checked separately.
          shellcheck -x bin/wabox-bot
          shellcheck lib/backends/*.sh

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats + dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq inotify-tools util-linux coreutils
      - name: Run bats
        run: bats test/bats/
